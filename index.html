<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Controle do Cartão</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        :root {
            --bg: #f4f7fc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #475569;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple: #8b5cf6;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .login-container {
            max-width: 450px;
            margin: 80px auto;
            background: var(--card);
            border-radius: 32px;
            padding: 35px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .login-container input {
            margin-bottom: 20px;
            padding: 12px;
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .user-bar {
            background: var(--card);
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .admin-badge {
            background: var(--warning);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        .action-btn {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        .action-btn.active {
            background: var(--primary);
            color: white;
        }

        .form-panel {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            display: none;
            border: 1px solid var(--border);
        }

        .form-panel.active {
            display: block;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            min-width: 150px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input, select, button {
            padding: 10px 14px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
        }

        button {
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .filter-tab {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            font-size: 0.8rem;
        }

        .data-table th {
            background: var(--primary);
            color: white;
            padding: 10px;
            text-align: left;
        }

        .data-table td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
        }

        .divida-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }

        .hidden {
            display: none;
        }

        .cpf-valid { color: var(--success); font-size: 0.7rem; }
        .cpf-invalid { color: var(--danger); font-size: 0.7rem; }
        .login-error { color: var(--danger); margin-top: 15px; font-size: 0.85rem; }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            gap: 15px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid white;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <h2>💳 Controle do Cartão</h2>
    <p>Digite seu nome e CPF</p>
    <input type="text" id="loginNome" placeholder="Seu nome completo">
    <input type="text" id="loginCPF" placeholder="CPF (apenas números)" maxlength="11">
    <div id="cpfValidationMsg" class="cpf-invalid hidden"></div>
    <input type="password" id="loginSenha" placeholder="Senha do administrador">
    <button id="btnLogin">🔓 Entrar</button>
    <button id="btnResetPassword" style="background: var(--warning); margin-top: 10px;">🔄 Esqueci minha senha</button>
    <div id="loginError" class="login-error hidden"></div>
</div>

<div id="resetPasswordScreen" class="login-container hidden">
    <h2>🔄 Redefinir Senha</h2>
    <p>Digite seu CPF e a nova senha</p>
    <input type="text" id="resetCPF" placeholder="CPF" maxlength="11">
    <div id="resetCpfValidationMsg" class="cpf-invalid hidden"></div>
    <input type="password" id="resetNewPassword" placeholder="Nova senha">
    <input type="password" id="resetConfirmPassword" placeholder="Confirmar senha">
    <button id="btnConfirmReset">✅ Confirmar</button>
    <button id="btnBackToLogin" style="background: gray;">🔙 Voltar</button>
    <div id="resetError" class="login-error hidden"></div>
</div>

<div id="mainContent" style="display: none;">
    <div class="container">
        <div class="user-bar">
            <div class="user-info">
                <span>👤 Conectado: <strong id="currentUserName"></strong></span>
                <span id="adminBadge" class="admin-badge hidden">👑 Administrador</span>
            </div>
            <button class="logout-btn" id="logoutBtn" style="background: var(--danger); color: white; padding: 6px 16px; border-radius: 40px;">🚪 Sair</button>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div id="adminActions" class="action-buttons" style="display: none;">
            <button class="action-btn active" data-acao="newLoan">➕ Nova dívida</button>
            <button class="action-btn" data-acao="pay">💰 Pagar parcela</button>
            <button class="action-btn" data-acao="edit">✏️ Editar</button>
            <button class="action-btn" data-acao="backup">💾 Backup</button>
        </div>

        <div id="form-newLoan" class="form-panel">
            <h3>➕ Nova dívida</h3>
            <div class="form-row">
                <div class="form-group"><label>Nome</label><input type="text" id="newName" placeholder="Nome completo"></div>
                <div class="form-group"><label>CPF</label><input type="text" id="newCPF" placeholder="Apenas números" maxlength="11"></div>
                <div class="form-group"><label>WhatsApp</label><input type="text" id="newWhats" placeholder="11999999999"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Valor da parcela (R$)</label><input type="number" id="newInstallment" placeholder="275"></div>
                <div class="form-group"><label>Total parcelas</label><input type="number" id="newTotal" placeholder="10"></div>
                <div class="form-group"><label>Parcelas pagas</label><input type="number" id="newPaid" value="0"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Cartão</label><select id="newCard"><option value="A">Cartão A</option><option value="B">Cartão B</option></select></div>
                <div class="form-group"><label>Data início</label><input type="date" id="newDate"></div>
            </div>
            <button id="createLoanBtn">✅ Criar</button>
        </div>

        <div id="form-pay" class="form-panel">
            <h3>💰 Pagar parcela</h3>
            <div class="form-row">
                <div class="form-group"><label>Dívida</label><select id="payLoanSelect"></select></div>
                <div class="form-group"><label>Data pagamento</label><input type="date" id="payDate"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Senha</label><input type="password" id="paySenha"></div>
            </div>
            <button id="payInstallmentBtn">✅ Confirmar</button>
        </div>

        <div id="form-edit" class="form-panel">
            <h3>✏️ Editar dívida</h3>
            <div class="form-row">
                <div class="form-group"><label>Dívida</label><select id="editLoanSelect"></select></div>
                <div class="form-group"><label>Valor (R$)</label><input type="number" id="editInstallmentValue"></div>
                <div class="form-group"><label>Total parcelas</label><input type="number" id="editTotalParcels"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Senha</label><input type="password" id="editSenha"></div>
            </div>
            <div class="form-row">
                <button id="saveEditBtn">💾 Salvar</button>
                <button id="deleteLoanBtn" class="btn-danger" style="background: var(--danger);">🗑️ Excluir</button>
            </div>
        </div>

        <div id="form-backup" class="form-panel">
            <h3>💾 Backup</h3>
            <div class="form-row">
                <button id="exportExcelBtn">📊 Excel</button>
                <button id="backupBtn">📁 Backup JSON</button>
                <button id="restoreBtn">🔄 Restaurar</button>
                <input type="file" id="restoreFile" accept=".json" style="display:none">
            </div>
        </div>

        <div class="tabs-container">
            <button class="filter-tab active" data-filtro="A">💳 Cartão A</button>
            <button class="filter-tab" data-filtro="B">💳 Cartão B</button>
            <button class="filter-tab" data-filtro="all">📋 Todos</button>
            <button class="filter-tab" data-filtro="quitadas">✅ Quitadas</button>
            <button class="filter-tab" data-filtro="graficos">📈 Gráficos</button>
        </div>

        <div id="graficosContainer" style="display: none;">
            <div class="chart-container" style="background: var(--card); border-radius: 20px; padding: 20px;">
                <canvas id="evolucaoChart"></canvas>
            </div>
        </div>

        <div id="conteudoListas">
            <div id="divActiveLoans"><h2>📋 Dívidas ativas</h2><div id="activeLoansList"></div></div>
            <div id="divQuitadasLista" style="display: none;"><h2>✅ Quitadas</h2><div id="quitadasTableBody"></div></div>
            <div id="divTabelaGeral"><h2>📊 Tabela geral</h2><div id="tableBody"></div></div>
        </div>
    </div>
</div>

<div id="modalWhats" class="modal hidden" style="position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:1000;">
    <div style="background: white; padding: 25px; border-radius: 24px; max-width: 400px; width:90%">
        <h3>📲 WhatsApp</h3>
        <input type="text" id="whatsNumero" placeholder="Número" style="width:100%; margin:10px 0; padding:10px;">
        <textarea id="whatsMensagem" rows="4" style="width:100%; margin:10px 0; padding:10px;"></textarea>
        <button id="btnEnviarWhats" style="background:#25D366;">📲 Enviar</button>
        <button id="btnFecharWhats" style="background:gray;">Cancelar</button>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <div class="loading-text">⏳ Processando...</div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzYEI57ASfV_gdy8DRIpVmJ96D8FyuVR0o-6e2-zKWRzMz_06nZslCxOJf-ULSw9vgB/exec';
    const ADMIN_CPF = "12345678909";
    const SENHA_PADRAO = "123456";
    
    let dividas = [];
    let currentUser = null, currentCPF = null, isAdmin = false;
    let abaFiltroAtual = "A";
    let chartInstance = null;

    function showLoading(msg) { 
        document.getElementById('loadingText').textContent = msg || "⏳ Processando...";
        document.getElementById('loadingOverlay').classList.remove('hidden'); 
    }
    function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

    function validarCPF(cpf) {
        cpf = cpf.replace(/\D/g, '');
        if (cpf.length !== 11) return false;
        if (/^(\d)\1{10}$/.test(cpf)) return false;
        let soma = 0;
        for (let i = 0; i < 9; i++) soma += parseInt(cpf.charAt(i)) * (10 - i);
        let resto = 11 - (soma % 11);
        let digito1 = (resto === 10 || resto === 11) ? 0 : resto;
        if (digito1 !== parseInt(cpf.charAt(9))) return false;
        soma = 0;
        for (let i = 0; i < 10; i++) soma += parseInt(cpf.charAt(i)) * (11 - i);
        resto = 11 - (soma % 11);
        let digito2 = (resto === 10 || resto === 11) ? 0 : resto;
        return digito2 === parseInt(cpf.charAt(10));
    }

    function formatarCPF(cpf) {
        cpf = cpf.replace(/\D/g, '');
        if (cpf.length === 11) return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        return cpf;
    }

    function formatarDataBR(dataISO) {
        if (!dataISO) return '';
        let dataLimpa = dataISO.split('T')[0];
        let partes = dataLimpa.split('-');
        if (partes.length !== 3) return dataISO;
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function calcularDataInicioAuto(pagas, cartao) {
        let hoje = new Date();
        let diaVenc = cartao === 'A' ? 10 : 25;
        let data = new Date(hoje.getFullYear(), hoje.getMonth(), diaVenc);
        if (hoje.getDate() > diaVenc) data.setMonth(data.getMonth() + 1);
        if (pagas > 0) data.setMonth(data.getMonth() - pagas);
        return data.toISOString().split('T')[0];
    }

    function calcularVencimento(inicio, parcelaAtual, cartao) {
        if (!inicio) return null;
        let [ano, mes, dia] = inicio.split('-').map(Number);
        let diaVenc = cartao === 'A' ? 10 : 25;
        let mesVenc = mes + (parcelaAtual - 1);
        let anoVenc = ano;
        while (mesVenc > 12) { mesVenc -= 12; anoVenc++; }
        let ultimoDia = new Date(anoVenc, mesVenc, 0).getDate();
        let finalDia = Math.min(diaVenc, ultimoDia);
        return `${finalDia.toString().padStart(2,'0')}/${mesVenc.toString().padStart(2,'0')}/${anoVenc}`;
    }

    async function carregarDados() {
        try {
            const res = await fetch(`${API_URL}?action=load`);
            const data = await res.json();
            if (data.success && data.data) {
                dividas = data.data.map(row => ({
                    id: parseInt(row[0]), nome: row[1], cpf: row[2] || '', whats: row[3] || '',
                    valorParcela: parseFloat(row[4]), totalParcelas: parseInt(row[5]),
                    parcelaAtual: parseInt(row[6]), cartao: row[7], inicio: row[8] ? row[8].split('T')[0] : '',
                    pagamentos: row[9] ? JSON.parse(row[9]) : []
                }));
            }
            return true;
        } catch(e) { return false; }
    }

    async function salvarDados() {
        try {
            const res = await fetch(`${API_URL}?action=save&dados=${encodeURIComponent(JSON.stringify(dividas))}`);
            const data = await res.json();
            return data.success;
        } catch(e) { return false; }
    }

    function getFilteredAtivos() {
        let ativos = dividas.filter(d => d.parcelaAtual <= d.totalParcelas);
        if (!isAdmin && currentCPF) ativos = ativos.filter(d => d.nome.toLowerCase().trim() === currentUser?.toLowerCase().trim() && d.cpf === currentCPF);
        if (abaFiltroAtual === 'A' || abaFiltroAtual === 'B') ativos = ativos.filter(d => d.cartao === abaFiltroAtual);
        return ativos;
    }

    async function atualizarTela() {
        let ativos = getFilteredAtivos();
        let stats = document.getElementById('statsGrid');
        let totalDiv = ativos.reduce((s,d) => s + (d.totalParcelas - d.parcelaAtual + 1) * d.valorParcela, 0);
        stats.innerHTML = `<div class="stat-card"><h3>💰 Total</h3><div>R$ ${totalDiv.toFixed(2)}</div></div>
                           <div class="stat-card"><h3>📦 Ativas</h3><div>${ativos.length}</div></div>`;
        
        let container = document.getElementById('activeLoansList');
        if (ativos.length === 0) container.innerHTML = '<p>✨ Nenhuma dívida ativa</p>';
        else {
            container.innerHTML = ativos.map(d => {
                let faltam = d.totalParcelas - d.parcelaAtual + 1;
                let pendente = faltam * d.valorParcela;
                let venc = calcularVencimento(d.inicio, d.parcelaAtual, d.cartao) || '—';
                let percent = ((d.parcelaAtual-1)/d.totalParcelas)*100;
                return `<div class="divida-card">
                    <div><strong>${d.nome}</strong> (${d.cartao}) <span style="float:right">${d.parcelaAtual}/${d.totalParcelas}</span></div>
                    <div>💰 R$ ${d.valorParcela.toFixed(2)}</div>
                    <div>📅 Início: ${formatarDataBR(d.inicio)} | Venc: ${venc}</div>
                    <div class="progress-bar" style="height:4px; background:#eee; margin:8px 0;"><div style="width:${percent}%; height:4px; background:green; border-radius:2px;"></div></div>
                    <div><strong>Faltam: ${faltam}x R$ ${d.valorParcela.toFixed(2)} = R$ ${pendente.toFixed(2)}</strong></div>
                    <button class="btn-sm" onclick="abrirWhats(${d.id})" style="margin-top:8px; padding:4px 12px; background:#25D366; border:none; border-radius:20px;">📲 Cobrar</button>
                </div>`;
            }).join('');
        }

        let tabela = document.getElementById('tableBody');
        if (ativos.length === 0) tabela.innerHTML = '<tr><td colspan="8">✨ Nenhuma dívida</td></tr>';
        else {
            tabela.innerHTML = ativos.map(d => {
                let faltam = d.totalParcelas - d.parcelaAtual + 1;
                let pendente = faltam * d.valorParcela;
                let venc = calcularVencimento(d.inicio, d.parcelaAtual, d.cartao) || '—';
                return `<tr>
                    <td>${d.nome}</td><td>${formatarCPF(d.cpf)}</td><td>${d.cartao}</td>
                    <td>${d.parcelaAtual}/${d.totalParcelas}</td><td>R$ ${d.valorParcela.toFixed(2)}</td>
                    <td>${faltam}</td><td>R$ ${pendente.toFixed(2)}</td><td>${venc}</td>
                    <td><button onclick="abrirWhats(${d.id})" style="background:#25D366; border:none; padding:4px 8px; border-radius:12px;">📲</button></td>
                </tr>`;
            }).join('');
        }

        if (isAdmin) {
            let selectPay = document.getElementById('payLoanSelect');
            if (selectPay) selectPay.innerHTML = dividas.filter(d => d.parcelaAtual <= d.totalParcelas).map(d => `<option value="${d.id}">${d.nome} - ${d.parcelaAtual}/${d.totalParcelas}</option>`).join('');
            let selectEdit = document.getElementById('editLoanSelect');
            if (selectEdit) selectEdit.innerHTML = dividas.map(d => `<option value="${d.id}">${d.nome} - ${d.parcelaAtual}/${d.totalParcelas}</option>`).join('');
        }
    }

    window.abrirWhats = function(id) {
        let d = dividas.find(x => x.id === id);
        if (!d) return;
        let faltam = d.totalParcelas - d.parcelaAtual + 1;
        let pendente = faltam * d.valorParcela;
        let venc = calcularVencimento(d.inicio, d.parcelaAtual, d.cartao) || 'em breve';
        let msg = `Olá ${d.nome}! 📋\nSituação: ${d.parcelaAtual}/${d.totalParcelas}\nValor: R$ ${d.valorParcela.toFixed(2)}\nVencimento: ${venc}\nTotal pendente: R$ ${pendente.toFixed(2)}`;
        document.getElementById('whatsNumero').value = d.whats || '';
        document.getElementById('whatsMensagem').value = msg;
        document.getElementById('modalWhats').style.display = 'flex';
    };

    document.getElementById('btnEnviarWhats')?.addEventListener('click', () => {
        let num = document.getElementById('whatsNumero').value.replace(/\D/g, '');
        let msg = encodeURIComponent(document.getElementById('whatsMensagem').value);
        if (num) window.open(`https://wa.me/55${num}?text=${msg}`, '_blank');
        else alert("Número inválido");
        document.getElementById('modalWhats').style.display = 'none';
    });
    document.getElementById('btnFecharWhats')?.addEventListener('click', () => {
        document.getElementById('modalWhats').style.display = 'none';
    });

    document.getElementById('btnLogin')?.addEventListener('click', async () => {
        let nome = document.getElementById('loginNome').value.trim();
        let cpf = document.getElementById('loginCPF').value.trim();
        let senha = document.getElementById('loginSenha').value;
        let error = document.getElementById('loginError');
        if (!nome) { error.innerText = 'Digite seu nome'; error.classList.remove('hidden'); return; }
        if (!cpf) { error.innerText = 'Digite seu CPF'; error.classList.remove('hidden'); return; }
        if (!validarCPF(cpf)) { error.innerText = 'CPF inválido!'; error.classList.remove('hidden'); return; }
        error.classList.add('hidden');
        
        showLoading("🔐 Carregando...");
        await carregarDados();
        
        if (senha === SENHA_PADRAO || (localStorage.getItem('admin_pass') && senha === localStorage.getItem('admin_pass'))) {
            isAdmin = true;
            currentUser = nome;
            currentCPF = cpf;
            document.getElementById('currentUserName').innerHTML = `${nome} (Admin)`;
            document.getElementById('adminBadge').classList.remove('hidden');
            document.getElementById('adminActions').style.display = 'flex';
        } else {
            let existe = dividas.some(d => d.nome.toLowerCase().trim() === nome.toLowerCase().trim() && d.cpf === cpf);
            if (!existe) {
                hideLoading();
                error.innerText = '❌ Nenhuma dívida para este nome e CPF!';
                error.classList.remove('hidden');
                return;
            }
            if (senha) {
                hideLoading();
                error.innerText = '⚠️ Cliente não precisa de senha!';
                error.classList.remove('hidden');
                return;
            }
            isAdmin = false;
            currentUser = nome;
            currentCPF = cpf;
            document.getElementById('currentUserName').innerHTML = nome;
            document.getElementById('adminBadge').classList.add('hidden');
            document.getElementById('adminActions').style.display = 'none';
        }
        
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        await atualizarTela();
        hideLoading();
    });

    document.getElementById('btnResetPassword')?.addEventListener('click', () => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('resetPasswordScreen').style.display = 'block';
    });
    document.getElementById('btnBackToLogin')?.addEventListener('click', () => {
        document.getElementById('resetPasswordScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'block';
    });
    document.getElementById('btnConfirmReset')?.addEventListener('click', () => {
        let cpf = document.getElementById('resetCPF').value.trim();
        let nova = document.getElementById('resetNewPassword').value;
        let conf = document.getElementById('resetConfirmPassword').value;
        if (cpf !== ADMIN_CPF) { alert("CPF inválido!"); return; }
        if (!nova || nova.length < 4) { alert("Senha muito curta"); return; }
        if (nova !== conf) { alert("Senhas não coincidem"); return; }
        localStorage.setItem('admin_pass', nova);
        alert(`✅ Senha alterada para: ${nova}`);
        document.getElementById('resetPasswordScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'block';
    });

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        currentUser = null; currentCPF = null; isAdmin = false;
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginNome').value = '';
        document.getElementById('loginCPF').value = '';
        document.getElementById('loginSenha').value = '';
    });

    document.getElementById('createLoanBtn')?.addEventListener('click', async () => {
        if (!isAdmin) return;
        let nome = document.getElementById('newName').value.trim();
        let cpf = document.getElementById('newCPF').value.trim();
        let whats = document.getElementById('newWhats').value.trim();
        let valor = parseFloat(document.getElementById('newInstallment').value);
        let total = parseInt(document.getElementById('newTotal').value);
        let pagas = parseInt(document.getElementById('newPaid').value) || 0;
        let cartao = document.getElementById('newCard').value;
        let inicio = document.getElementById('newDate').value;
        if (!nome || !cpf) { alert("Nome e CPF obrigatórios"); return; }
        if (!validarCPF(cpf)) { alert("CPF inválido!"); return; }
        if (isNaN(valor) || valor <= 0) { alert("Valor inválido"); return; }
        if (isNaN(total) || total <= 0) { alert("Total inválido"); return; }
        if (!inicio) inicio = calcularDataInicioAuto(pagas, cartao);
        let novoId = dividas.length > 0 ? Math.max(...dividas.map(d => d.id)) + 1 : 1;
        dividas.push({ id: novoId, nome, cpf, whats, valorParcela: valor, totalParcelas: total, parcelaAtual: pagas + 1, cartao, inicio, pagamentos: [] });
        showLoading("💾 Salvando...");
        if (await salvarDados()) { await carregarDados(); await atualizarTela(); alert("✅ Cadastrado!"); }
        else alert("❌ Erro!");
        hideLoading();
        document.getElementById('newName').value = '';
        document.getElementById('newCPF').value = '';
        document.getElementById('newWhats').value = '';
        document.getElementById('newInstallment').value = '';
        document.getElementById('newTotal').value = '';
        document.getElementById('newPaid').value = '0';
        document.getElementById('newDate').value = '';
    });

    document.getElementById('payInstallmentBtn')?.addEventListener('click', async () => {
        if (!isAdmin) return;
        let senha = document.getElementById('paySenha').value;
        let adminPass = localStorage.getItem('admin_pass') || SENHA_PADRAO;
        if (senha !== adminPass) { alert("Senha incorreta!"); return; }
        let id = parseInt(document.getElementById('payLoanSelect').value);
        let data = document.getElementById('payDate').value;
        let divida = dividas.find(d => d.id === id);
        if (!divida || divida.parcelaAtual > divida.totalParcelas) { alert("Dívida quitada"); return; }
        if (!data) { alert("Data obrigatória"); return; }
        if (!divida.pagamentos) divida.pagamentos = [];
        divida.pagamentos.push({ data, parcela: divida.parcelaAtual });
        divida.parcelaAtual++;
        showLoading("💾 Registrando...");
        if (await salvarDados()) { await carregarDados(); await atualizarTela(); alert("✅ Pagamento registrado!"); }
        else alert("❌ Erro!");
        hideLoading();
        document.getElementById('payDate').value = '';
        document.getElementById('paySenha').value = '';
    });

    document.getElementById('saveEditBtn')?.addEventListener('click', async () => {
        if (!isAdmin) return;
        let senha = document.getElementById('editSenha').value;
        let adminPass = localStorage.getItem('admin_pass') || SENHA_PADRAO;
        if (senha !== adminPass) { alert("Senha incorreta!"); return; }
        let id = parseInt(document.getElementById('editLoanSelect').value);
        let divida = dividas.find(d => d.id === id);
        if (!divida) return;
        let novoValor = parseFloat(document.getElementById('editInstallmentValue').value);
        let novoTotal = parseInt(document.getElementById('editTotalParcels').value);
        if (isNaN(novoValor) || isNaN(novoTotal)) { alert("Valores inválidos"); return; }
        divida.valorParcela = novoValor;
        if (novoTotal < divida.parcelaAtual) divida.parcelaAtual = novoTotal;
        divida.totalParcelas = novoTotal;
        showLoading("💾 Salvando...");
        if (await salvarDados()) { await carregarDados(); await atualizarTela(); alert("✅ Atualizado!"); }
        else alert("❌ Erro!");
        hideLoading();
        document.getElementById('editSenha').value = '';
    });

    document.getElementById('deleteLoanBtn')?.addEventListener('click', async () => {
        if (!isAdmin) return;
        let senha = document.getElementById('editSenha').value;
        let adminPass = localStorage.getItem('admin_pass') || SENHA_PADRAO;
        if (senha !== adminPass) { alert("Senha incorreta!"); return; }
        let id = parseInt(document.getElementById('editLoanSelect').value);
        if (!confirm("Excluir permanentemente?")) return;
        dividas = dividas.filter(d => d.id !== id);
        showLoading("🗑️ Excluindo...");
        if (await salvarDados()) { await carregarDados(); await atualizarTela(); alert("✅ Excluído!"); }
        else alert("❌ Erro!");
        hideLoading();
        document.getElementById('editSenha').value = '';
    });

    document.getElementById('exportExcelBtn')?.addEventListener('click', () => {
        let dados = dividas.map(d => ({ Nome: d.nome, CPF: formatarCPF(d.cpf), WhatsApp: d.whats, Valor: d.valorParcela, Total: d.totalParcelas, Atual: d.parcelaAtual, Cartão: d.cartao, Início: formatarDataBR(d.inicio) }));
        let ws = XLSX.utils.json_to_sheet(dados);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dividas");
        XLSX.writeFile(wb, `dividas_${new Date().toISOString().slice(0,10)}.xlsx`);
    });

    document.getElementById('backupBtn')?.addEventListener('click', () => {
        let a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(dividas)], {type:'application/json'}));
        a.download = `backup_${Date.now()}.json`;
        a.click();
    });

    document.getElementById('restoreBtn')?.addEventListener('click', () => document.getElementById('restoreFile').click());
    document.getElementById('restoreFile')?.addEventListener('change', async (e) => {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                dividas = JSON.parse(ev.target.result);
                showLoading("🔄 Restaurando...");
                if (await salvarDados()) { await carregarDados(); await atualizarTela(); alert("✅ Restaurado!"); }
                hideLoading();
            } catch(e) { alert("Arquivo inválido"); }
        };
        reader.readAsText(file);
    });

    document.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            let acao = btn.getAttribute('data-acao');
            document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`form-${acao}`).classList.add('active');
        });
    });

    document.querySelectorAll('.filter-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            abaFiltroAtual = btn.getAttribute('data-filtro');
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let graficosDiv = document.getElementById('graficosContainer');
            let divActive = document.getElementById('divActiveLoans');
            let divQuitadas = document.getElementById('divQuitadasLista');
            let divTabela = document.getElementById('divTabelaGeral');
            if (abaFiltroAtual === 'graficos') {
                graficosDiv.style.display = 'block';
                divActive.style.display = 'none';
                divQuitadas.style.display = 'none';
                divTabela.style.display = 'none';
            } else if (abaFiltroAtual === 'quitadas') {
                graficosDiv.style.display = 'none';
                divActive.style.display = 'none';
                divQuitadas.style.display = 'block';
                divTabela.style.display = 'none';
            } else {
                graficosDiv.style.display = 'none';
                divActive.style.display = 'block';
                divQuitadas.style.display = 'none';
                divTabela.style.display = 'block';
            }
            atualizarTela();
        });
    });

    document.getElementById('loginCPF')?.addEventListener('input', function() {
        let cpf = this.value;
        let msg = document.getElementById('cpfValidationMsg');
        if (cpf.length === 11) {
            if (validarCPF(cpf)) { msg.textContent = '✓ CPF válido'; msg.className = 'cpf-valid'; }
            else { msg.textContent = '✗ CPF inválido'; msg.className = 'cpf-invalid'; }
        } else if (cpf.length > 0) { msg.textContent = `Faltam ${11-cpf.length} dígitos`; msg.className = 'cpf-invalid'; }
        else msg.classList.add('hidden');
    });

    console.log("✅ Sistema pronto - aguardando login");
</script>
</body>
</html>
